<!DOCTYPE html><html lang="en"><head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>History - OMOSHIROI JAPAN</title>
    <link rel="icon" type="image/png" href="../assets/images/favicon.png">
    <link rel="alternate" hreflang="id" href="../id/history.html">
    <link rel="alternate" hreflang="en" href="history.html">
    <link rel="stylesheet" href="../assets/css/style.css">
    <style>
        .history-table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 1rem;
        }
        .history-table th, .history-table td {
            padding: 1rem;
            text-align: left;
            border-bottom: 1px solid var(--border-color);
        }
        .history-table th {
            background-color: var(--primary-light);
            color: var(--primary);
            font-weight: 600;
        }
        .analytics-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 1rem;
            margin-bottom: 2rem;
        }
        .analytics-card {
            background: var(--background);
            padding: 1.5rem;
            border-radius: var(--radius);
            text-align: center;
            border: 1px solid var(--border-color);
        }
        .analytics-value {
            font-size: 2rem;
            color: var(--primary);
            font-weight: 700;
        }
        .btn-sm {
            padding: 0.25rem 0.75rem;
            font-size: 0.85rem;
        }
    </style>
</head>
<body>
    <header>
        <div class="container flex items-center justify-between">
            <a href="dashboard.html" class="brand"><img src="../assets/images/logo.png" alt="Logo" style="height: 30px; margin-right: 0.5rem;"> OMOSHIROI</a>
            <nav class="nav-links">
                <span id="userNameDisplay" style="font-weight: 600; color: var(--text-primary);"></span>
                <a href="dashboard.html">Dashboard</a>
                <a href="#" id="logoutBtn">Logout</a>
                <a href="../id/history.html" onclick="localStorage.setItem('lang','id')" style="font-size:0.85rem;">ID</a>
            </nav>
            <button class="hamburger-btn" id="mobileMenuBtn" aria-label="Toggle Menu">☰</button>
        </div>
    </header>

    <main class="container">
        <div class="text-center mb-2">
            <h1>Test History &amp; Analytics</h1>
            <p style="color: var(--text-secondary);">Review your past performances and track your progress.</p>
        </div>

        <div class="analytics-grid">
            <div class="analytics-card">
                <div style="font-size: 0.9rem; color: var(--text-secondary);">Total Attempts</div>
                <div class="analytics-value" id="totalAttempts">0</div>
            </div>
            <div class="analytics-card">
                <div style="font-size: 0.9rem; color: var(--text-secondary);">Average Score</div>
                <div class="analytics-value" id="avgScore">0%</div>
            </div>
        </div>

        <div class="card">
            <div style="overflow-x: auto;">
                <table class="history-table">
                    <thead>
                        <tr>
                            <th>Date</th>
                            <th>Level</th>
                            <th>Score</th>
                            <th>Action</th>
                        </tr>
                    </thead>
                    <tbody id="historyTableBody">
                        <!-- Populated by JS -->
                    </tbody>
                </table>
            </div>
        </div>
    </main>

    <script src="../assets/js/utils.js"></script>
    <script src="../assets/js/history.js"></script>



    <div class="nav-overlay" id="mobileNavOverlay"></div>
</body></html>
